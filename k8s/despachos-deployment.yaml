apiVersion: apps/v1
kind: Deployment
metadata:
  name: despachos-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: despachos-api
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: despachos-api
    spec:
      nodeSelector:
        role: back
      containers:
        - name: despachos-api
          image: TU_ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/ev3-backend-despachos:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          env:
            - name: DB_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: DB_ENDPOINT
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: DB_NAME
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: DB_PASSWORD
            - name: FRONTEND_URL
              value: "*"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "600m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: despachos-service
spec:
  type: NodePort
  selector:
    app: despachos-api
  ports:
    - port: 8081
      targetPort: 8081
      nodePort: 30082